{% extends 'blog/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <!-- Categoría -->
                    {% if post.categoria %}
                    <span class="badge bg-primary mb-3">{{ post.categoria }}</span>
                    {% endif %}

                    <!-- Título -->
                    <h1 class="card-title mb-3">{{ post.titulo }}</h1>

                    <!-- Info -->
                    <div class="text-muted mb-4">
                        <small>
                            👤 {{ post.autor }} &nbsp;|&nbsp;
                            📅 {{ post.fecha_creacion|date:"d/m/Y" }} &nbsp;|&nbsp;
                            <span class="badge bg-success">{{ post.estado }}</span>
                        </small>
                    </div>

                    <hr>

                    <!-- Contenido -->
                    <p class="card-text mt-4" style="font-size: 1.1rem; line-height: 1.8;">
                        {{ post.contenido }}
                    </p>

                    <hr>

                    <!-- Botones -->
                    <div class="d-flex gap-2 mt-4">
                        <a href="{% url 'editar_post' post.pk %}" class="btn btn-warning">
                            ✏️ Editar
                        </a>
                        <a href="{% url 'eliminar_post' post.pk %}" class="btn btn-danger">
                            🗑️ Eliminar
                        </a>
                        <a href="{% url 'home' %}" class="btn btn-secondary">
                            🏠 Volver al inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
